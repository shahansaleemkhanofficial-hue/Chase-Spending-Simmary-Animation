<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chase Spending Summary</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
  }
  .wrap {
    position: relative;
    width: min(90vw, 90vh, 520px);
    height: min(90vw, 90vh, 520px);
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }
  .center {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .label {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-weight: 400;
    font-size: clamp(12px, 3.5vw, 20px);
    color: #444;
    margin-bottom: clamp(4px, 1.5vw, 10px);
    letter-spacing: 0.01em;
  }
  .amount {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-weight: 300;
    font-size: clamp(22px, 7vw, 48px);
    color: #1a1a1a;
    margin-bottom: clamp(6px, 2vw, 16px);
    letter-spacing: -0.02em;
    line-height: 1;
    white-space: nowrap;
  }
  .link {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-weight: 700;
    font-size: clamp(11px, 3vw, 17px);
    color: #1565c0;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="c"></canvas>
  <div class="center">
    <div class="label">Total Spending</div>
    <div class="amount" id="amt">$0.00</div>
    <div class="link">See Transactions ›</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const amtEl = document.getElementById('amt');

const SIZE = 1080;
canvas.width = SIZE;
canvas.height = SIZE;

const cx = SIZE/2, cy = SIZE/2;
const outerR = 430, innerR = 310;
const FINAL = 174428.56;
const GAP = 2;
const RING_START = 135;
const TOTAL_ARC = 330;
const SEG_WEIGHTS = [18,14,16,18,15,17,14,16,18,20,12,14,16,18,14,16,15,16];
const totalW = SEG_WEIGHTS.reduce((a,b)=>a+b,0);
const availArc = TOTAL_ARC - (SEG_WEIGHTS.length-1)*GAP;

let segments = [];
let cur = RING_START;
for(let i=0;i<SEG_WEIGHTS.length;i++){
  const arc=(SEG_WEIGHTS[i]/totalW)*availArc;
  segments.push({start:cur,end:cur+arc});
  cur+=arc+GAP;
}

function toRad(deg){ return (deg-90)*Math.PI/180; }

function drawSegment(start,end){
  ctx.beginPath();
  ctx.arc(cx,cy,outerR,toRad(start),toRad(end),false);
  ctx.arc(cx,cy,innerR,toRad(end),toRad(start),true);
  ctx.closePath();
  ctx.fillStyle='#a8c4dc';
  ctx.fill();
}

function easeInOut(t){ return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }
function easeOut(t){ return 1-Math.pow(1-t,3); }

function fmt(v){
  const s=v.toFixed(2).split('.');
  s[0]=s[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');
  return '$'+s[0]+'.'+s[1];
}

const DURATION = 2500;
const startTime = performance.now();

function frame(now){
  const rawT = Math.min((now - startTime)/DURATION, 1);
  const t = easeInOut(rawT);
  const revealedArc = t * TOTAL_ARC;

  ctx.clearRect(0,0,SIZE,SIZE);

  for(let i=0;i<segments.length;i++){
    const seg=segments[i];
    const relStart=seg.start-RING_START;
    if(revealedArc<=relStart) continue;
    const visEnd=Math.min(seg.end, RING_START+revealedArc);
    if(visEnd<=seg.start) continue;
    drawSegment(seg.start,visEnd);
  }

  amtEl.textContent = fmt(easeOut(rawT)*FINAL);

  if(rawT<1) requestAnimationFrame(frame);
  else amtEl.textContent = fmt(FINAL);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
